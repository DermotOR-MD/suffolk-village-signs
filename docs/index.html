<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Suffolk Village Signs</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      background: #1a1a2e;
      color: #f0f0f0;
    }

    /* ── Header ── */
    #header {
      flex-shrink: 0;
      padding: 10px 16px 0;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }

    #header h1 {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #e2e8f0;
    }

    #stats-line {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    #stats-line strong { color: #4ade80; }

    #progress-track {
      height: 6px;
      background: #334155;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #4ade80);
      border-radius: 3px;
      transition: width 0.4s ease;
      width: 0%;
    }

    /* ── Tabs ── */
    #tabs {
      display: flex;
      gap: 4px;
    }

    .tab-btn {
      padding: 6px 16px;
      font-size: 0.82rem;
      font-weight: 500;
      border: none;
      border-radius: 4px 4px 0 0;
      cursor: pointer;
      background: #0f3460;
      color: #94a3b8;
      transition: background 0.15s, color 0.15s;
    }

    .tab-btn.active {
      background: #1a1a2e;
      color: #e2e8f0;
    }

    /* ── Panels ── */
    #map {
      flex: 1;
      min-height: 0;
    }

    #todo-panel {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: none;
      background: #1a1a2e;
      padding: 0 0 16px;
    }

    #todo-panel.active { display: block; }

    #todo-panel table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    #todo-panel thead th {
      position: sticky;
      top: 0;
      background: #16213e;
      color: #94a3b8;
      font-weight: 600;
      text-align: left;
      padding: 10px 16px;
      border-bottom: 1px solid #0f3460;
    }

    #todo-panel tbody tr:nth-child(even) { background: #16213e44; }

    #todo-panel tbody td {
      padding: 8px 16px;
      color: #cbd5e1;
      border-bottom: 1px solid #0f346022;
    }

    #todo-panel tbody td.dist {
      color: #94a3b8;
      white-space: nowrap;
    }

    #todo-download {
      display: block;
      margin: 12px 16px 4px;
      padding: 7px 14px;
      background: #0f3460;
      color: #e2e8f0;
      font-size: 0.8rem;
      border: 1px solid #1e4d8c;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      width: fit-content;
    }

    #todo-download:hover { background: #1e4d8c; }

    /* ── Leaflet popup tweaks ── */
    .leaflet-popup-content { min-width: 160px; max-width: 260px; }

    .popup-visited img {
      display: block;
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 4px;
    }

    .popup-visited img + img { margin-top: 4px; }

    .popup-name { font-weight: 600; font-size: 0.95rem; color: #1e293b; }
    .popup-detail { font-size: 0.78rem; color: #64748b; margin-top: 2px; }

    /* ── Legend ── */
    #legend {
      position: absolute;
      bottom: 24px;
      right: 10px;
      z-index: 1000;
      background: rgba(22, 33, 62, 0.92);
      border: 1px solid #0f3460;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.75rem;
      color: #cbd5e1;
      pointer-events: none;
    }

    .legend-row { display: flex; align-items: center; gap: 7px; margin: 3px 0; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .dot-visited   { background: #22c55e; border: 2px solid #166534; }
    .dot-unvisited { background: #94a3b8; border: 2px solid #475569; }

    /* ── Admin mode: hide no-sign controls until unlocked ── */
    body:not(.admin-mode) .no-sign-btn,
    body:not(.admin-mode) .no-sign-row-btn { display: none !important; }
    body:not(.admin-mode) #todo-panel thead th:last-child,
    body:not(.admin-mode) #todo-panel tbody td:last-child  { display: none; }

    /* ── Admin toggle button ── */
    #admin-toggle {
      background: none;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      opacity: 0.4;
      padding: 0;
      line-height: 1;
    }
    #admin-toggle:hover { opacity: 0.8; }

    /* ── No Sign button in map popup ── */
    .no-sign-btn {
      display: block;
      margin-top: 8px;
      padding: 4px 10px;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
      border-radius: 4px;
      font-size: 0.78rem;
      cursor: pointer;
      width: 100%;
    }
    .no-sign-btn:hover { background: #fecaca; }

    /* ── No Sign button in To Do list rows ── */
    .no-sign-row-btn {
      padding: 2px 8px;
      background: transparent;
      color: #64748b;
      border: 1px solid #334155;
      border-radius: 3px;
      font-size: 0.75rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .no-sign-row-btn:hover { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }

    /* ── Excluded section ── */
    #excluded-section {
      margin: 16px 16px 0;
    }

    #excluded-section details {
      border: 1px solid #334155;
      border-radius: 5px;
      overflow: hidden;
    }

    #excluded-section summary {
      padding: 8px 12px;
      background: #16213e;
      color: #94a3b8;
      font-size: 0.82rem;
      cursor: pointer;
      user-select: none;
    }

    #excluded-section summary:hover { color: #cbd5e1; }

    .excluded-list {
      list-style: none;
      padding: 4px 0;
    }

    .excluded-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      font-size: 0.83rem;
      color: #94a3b8;
      border-bottom: 1px solid #0f346022;
    }

    .excluded-list li:last-child { border-bottom: none; }

    .restore-btn {
      padding: 2px 8px;
      background: transparent;
      color: #4ade80;
      border: 1px solid #166534;
      border-radius: 3px;
      font-size: 0.75rem;
      cursor: pointer;
      flex-shrink: 0;
      margin-left: 8px;
    }
    .restore-btn:hover { background: #14532d; }
  </style>
</head>
<body>

<div id="header">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
    <h1 style="margin-bottom:0">Suffolk Village Signs</h1>
    <button id="admin-toggle" onclick="toggleAdmin()" title="Admin"></button>
  </div>
  <div id="stats-line" style="margin-bottom:6px">Loading…</div>
  <div id="progress-track"><div id="progress-fill"></div></div>
  <div id="tabs">
    <button class="tab-btn active" onclick="showTab('map')">Map</button>
    <button class="tab-btn" onclick="showTab('todo')">To Do</button>
    <a href="planner.html" class="tab-btn" style="text-decoration:none">Plan Route</a>
  </div>
</div>

<div id="map"></div>
<div id="todo-panel"></div>

<div id="legend">
  <div class="legend-row"><div class="legend-dot dot-visited"></div>Visited</div>
  <div class="legend-row"><div class="legend-dot dot-unvisited"></div>Not yet visited</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Admin auth ───────────────────────────────────────────────────────────────
const ADMIN_HASH = '997690e82d4cde654c9bff5eeb95a94fa155cb0e2a491bc538fdaaa97f13b289';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function toggleAdmin() {
  const btn = document.getElementById('admin-toggle');
  if (document.body.classList.contains('admin-mode')) {
    document.body.classList.remove('admin-mode');
    sessionStorage.removeItem('adminAuth');
    btn.textContent = '🔒';
    return;
  }
  const pw = prompt('Password:');
  if (!pw) return;
  if (await sha256(pw) === ADMIN_HASH) {
    document.body.classList.add('admin-mode');
    sessionStorage.setItem('adminAuth', '1');
    btn.textContent = '🔓';
  } else {
    alert('Incorrect password.');
  }
}

// Restore admin session across page reloads
if (sessionStorage.getItem('adminAuth')) {
  document.body.classList.add('admin-mode');
  document.getElementById('admin-toggle').textContent = '🔓';
} else {
  document.getElementById('admin-toggle').textContent = '🔒';
}

// ── Tab switching ────────────────────────────────────────────────────────────
let map;

function showTab(tab) {
  document.querySelectorAll(".tab-btn").forEach((b, i) => {
    b.classList.toggle("active", (i === 0) === (tab === "map"));
  });
  document.getElementById("map").style.display        = tab === "map"  ? "block" : "none";
  document.getElementById("todo-panel").style.display = tab === "todo" ? "block" : "none";
  document.getElementById("legend").style.display     = tab === "map"  ? "block" : "none";
  if (tab === "map" && map) map.invalidateSize();
}

// ── localStorage helpers ─────────────────────────────────────────────────────
const EXCLUDED_KEY = 'villageSigns_noSign';
const excluded = (() => {
  try { return new Set(JSON.parse(localStorage.getItem(EXCLUDED_KEY) || '[]')); }
  catch { return new Set(); }
})();
function saveExcluded() { localStorage.setItem(EXCLUDED_KEY, JSON.stringify([...excluded])); }
function formatDate(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-').map(Number);
  return new Date(y, m - 1, d).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Main ─────────────────────────────────────────────────────────────────────
(async () => {
  map = L.map("map", { center: [52.13, 0.95], zoom: 10 });

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19,
  }).addTo(map);

  function visitedMarker(lat, lon) {
    return L.circleMarker([lat, lon], {
      radius: 7, fillColor: "#22c55e", fillOpacity: 0.9, color: "#166534", weight: 1.5,
    });
  }

  function unvisitedMarker(lat, lon) {
    return L.circleMarker([lat, lon], {
      radius: 5, fillColor: "#94a3b8", fillOpacity: 0.6, color: "#475569", weight: 1,
    });
  }

  // Load data
  let data;
  try {
    const resp = await fetch("data.json");
    if (!resp.ok) throw new Error(resp.statusText);
    data = await resp.json();
  } catch (e) {
    document.getElementById("stats-line").textContent = "No data yet — run the build script first.";
    return;
  }

  const { visited, unvisited, stats } = data;

  const unvisitedByName = new Map(unvisited.map(u => [u.name, u]));
  const unvisitedMarkers = new Map(); // name → L.circleMarker
  const todoRowsByName   = new Map(); // name → <tr>

  // ── Stats ──────────────────────────────────────────────────────────────────
  function renderStats() {
    const noSignCount = [...excluded].filter(n => unvisitedByName.has(n)).length;
    const effectiveTotal = stats.total - noSignCount;
    const pct = effectiveTotal > 0 ? ((stats.visited / effectiveTotal) * 100).toFixed(1) : 0;
    let line =
      `<strong>${stats.visited}</strong> of ${effectiveTotal} settlements visited &nbsp;·&nbsp; ${pct}%` +
      `&nbsp;·&nbsp; <span style="color:#64748b">updated ${stats.generated}</span>`;
    if (noSignCount > 0) {
      line += `&nbsp;·&nbsp; <span style="color:#94a3b8">${noSignCount} no sign</span>`;
    }
    document.getElementById("stats-line").innerHTML = line;
    document.getElementById("progress-fill").style.width = pct + "%";
  }

  // ── Excluded section ───────────────────────────────────────────────────────
  function renderExcludedSection() {
    let section = document.getElementById("excluded-section");
    if (!section) {
      section = document.createElement("div");
      section.id = "excluded-section";
      document.getElementById("todo-panel").appendChild(section);
    }

    const names = [...excluded].filter(n => unvisitedByName.has(n)).sort();
    if (names.length === 0) {
      section.innerHTML = "";
      return;
    }

    const isOpen = section.querySelector("details")?.open ?? false;
    section.innerHTML =
      `<details${isOpen ? " open" : ""}>` +
      `<summary>Excluded — no sign (${names.length})</summary>` +
      `<ul class="excluded-list">` +
      names.map(n =>
        `<li><span>${escHtml(n)}</span>` +
        `<button class="restore-btn" data-name="${escHtml(n)}">Restore</button></li>`
      ).join("") +
      `</ul></details>`;
  }

  // ── No sign / restore actions ──────────────────────────────────────────────
  function markNoSign(name) {
    excluded.add(name);
    saveExcluded();
    map.closePopup();
    const marker = unvisitedMarkers.get(name);
    if (marker) map.removeLayer(marker);
    const row = todoRowsByName.get(name);
    if (row) row.style.display = "none";
    renderExcludedSection();
    renderStats();
  }

  function restoreSettlement(name) {
    excluded.delete(name);
    saveExcluded();
    const marker = unvisitedMarkers.get(name);
    if (marker) marker.addTo(map);
    const row = todoRowsByName.get(name);
    if (row) row.style.display = "";
    renderExcludedSection();
    renderStats();
  }

  // ── Event delegation ───────────────────────────────────────────────────────
  document.addEventListener("click", e => {
    const btn = e.target.closest("[data-name]");
    if (!btn) return;
    const name = btn.dataset.name;
    if (btn.classList.contains("no-sign-btn") || btn.classList.contains("no-sign-row-btn")) {
      markNoSign(name);
    } else if (btn.classList.contains("restore-btn")) {
      restoreSettlement(name);
    }
  });

  // ── Map markers — visited ──────────────────────────────────────────────────
  for (const v of visited) {
    const m = visitedMarker(v.lat, v.lon);
    const photos = v.photos || (v.photo ? [v.photo] : []);
    const dateStr = v.date ? `<div class="popup-detail">${formatDate(v.date)}</div>` : "";
    const imgsHtml = photos.map(p =>
      `<img src="${p}" alt="${escHtml(v.name)}" loading="lazy">`
    ).join("");

    m.bindPopup(
      `<div class="popup-visited">${imgsHtml}` +
      `<div class="popup-name">${escHtml(v.name)}</div>${dateStr}</div>`,
      { maxWidth: 280 }
    );
    m.addTo(map);
  }

  // ── Map markers — unvisited ────────────────────────────────────────────────
  for (const u of unvisited) {
    const m = unvisitedMarker(u.lat, u.lon);

    const popupEl = document.createElement("div");
    popupEl.innerHTML =
      `<div class="popup-name">${escHtml(u.name)}</div>` +
      `<div class="popup-detail">${u.distance_km} km from home</div>` +
      `<button class="no-sign-btn" data-name="${escHtml(u.name)}">No sign here</button>`;
    m.bindPopup(popupEl, { maxWidth: 220 });

    unvisitedMarkers.set(u.name, m);
    if (!excluded.has(u.name)) m.addTo(map);
  }

  // ── To Do list ────────────────────────────────────────────────────────────
  const sorted = [...unvisited].sort((a, b) => a.distance_km - b.distance_km);

  const csvRows = ["Settlement,Distance (km)", ...sorted.map(u => `"${u.name}",${u.distance_km}`)];
  const csvBlob = new Blob([csvRows.join("\n")], { type: "text/csv" });
  const csvUrl  = URL.createObjectURL(csvBlob);

  const panel = document.getElementById("todo-panel");
  panel.innerHTML =
    `<a id="todo-download" href="${csvUrl}" download="suffolk-unvisited.csv">⬇ Download as CSV</a>` +
    `<table>
      <thead><tr><th>#</th><th>Settlement</th><th>Distance from home</th><th></th></tr></thead>
      <tbody id="todo-tbody"></tbody>
    </table>`;

  const tbody = document.getElementById("todo-tbody");
  sorted.forEach((u, i) => {
    const tr = document.createElement("tr");
    tr.dataset.name = u.name;
    if (excluded.has(u.name)) tr.style.display = "none";
    tr.innerHTML =
      `<td style="color:#475569">${i + 1}</td>` +
      `<td>${escHtml(u.name)}</td>` +
      `<td class="dist">${u.distance_km} km</td>` +
      `<td><button class="no-sign-row-btn" data-name="${escHtml(u.name)}">No sign</button></td>`;
    tbody.appendChild(tr);
    todoRowsByName.set(u.name, tr);
  });

  renderStats();
  renderExcludedSection();

})();
</script>
</body>
</html>
